<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>.KOM | PERSONAL AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0b;
      --bg-card: #141416;
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --border: #27272a;
      --gradient: linear-gradient(135deg, #22c55e 0%, #16a34a 50%, #15803d 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    h1, h2, h3 {
      font-family: 'Outfit', sans-serif;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 1.25rem 0;
      transition: background 0.3s ease;
    }

    header.scrolled {
      background: rgba(10, 10, 11, 0.9);
      backdrop-filter: blur(12px);
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .logo {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .logo span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: var(--gradient);
      color: white;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(34, 197, 94, 0.4);
    }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 8rem 0 4rem;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(34, 197, 94, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      max-width: 700px;
    }

    .hero h1 span {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 1.2rem;
      color: var(--text-muted);
      max-width: 500px;
      margin-bottom: 2rem;
    }

    .hero-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* Services */
    .services {
      padding: 6rem 0;
    }

    .section-header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .section-header h2 {
      font-size: clamp(2rem, 4vw, 2.75rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    .section-header p {
      color: var(--text-muted);
      font-size: 1.1rem;
      max-width: 500px;
      margin: 0 auto;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .service-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      transition: all 0.3s ease;
    }

    .service-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .service-icon {
      width: 48px;
      height: 48px;
      background: rgba(34, 197, 94, 0.15);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .service-card h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .service-card p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* About */
    .about {
      padding: 6rem 0;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 4rem;
      align-items: center;
    }

    .about h2 {
      font-size: clamp(2rem, 4vw, 2.75rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }

    .about h2 span {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .about p {
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.8;
    }

    .about p + p {
      margin-top: 1rem;
    }

    .about-stats {
      display: flex;
      gap: 3rem;
      margin-top: 2rem;
    }

    .about-stat h4 {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    .about-stat p {
      font-size: 0.9rem;
      margin: 0;
    }

    @media (max-width: 768px) {
      .about-grid {
        grid-template-columns: 1fr;
      }

      .about-stats {
        flex-wrap: wrap;
        gap: 2rem;
      }
    }

    /* CTA */
    .cta {
      padding: 6rem 0;
    }

    .cta-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 4rem 3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .cta-box::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, rgba(34, 197, 94, 0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .cta-box h2 {
      font-size: clamp(1.75rem, 3vw, 2.25rem);
      font-weight: 700;
      margin-bottom: 1rem;
      position: relative;
    }

    .cta-box p {
      color: var(--text-muted);
      margin-bottom: 2rem;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      position: relative;
    }

    .cta-box .btn {
      position: relative;
    }

    /* Gallery */
    .gallery {
      padding: 6rem 0;
    }

    .gallery .section-header {
      margin-bottom: 3rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .gallery-item {
      position: relative;
      aspect-ratio: 4/3;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.05);
    }

    .gallery-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 40%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .gallery-item:hover::after {
      opacity: 1;
    }

    .gallery-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5rem;
      color: white;
      z-index: 1;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
    }

    .gallery-item:hover .gallery-caption {
      opacity: 1;
      transform: translateY(0);
    }

    .gallery-caption strong {
      display: block;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      margin-bottom: 0.35rem;
    }

    .gallery-caption p {
      font-size: 0.85rem;
      line-height: 1.5;
      color: rgba(255,255,255,0.9);
      margin: 0;
    }

    @media (max-width: 900px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .gallery-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Footer */
    footer {
      padding: 3rem 0;
      border-top: 1px solid var(--border);
    }

    .footer-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-content p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .footer-links {
      display: flex;
      gap: 2rem;
    }

    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .footer-links a:hover {
      color: var(--accent);
    }

    /* Mobile */
    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }

      .hero {
        padding: 6rem 0 3rem;
      }

      .cta-box {
        padding: 3rem 1.5rem;
      }

      .footer-content {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <header id="header">
    <nav>
      <a href="#" class="logo">.KOM<span>.</span></a>
      <ul class="nav-links">
       
      </ul>
      <a href="#contact" class="btn btn-primary">Explore</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-content">
        <h1>AI like shadow <span>work</span> in the digital world</h1>
        <p id="hero-subtitle">just setup</p>
        <div class="hero-buttons">
          <a href="#contact" class="btn btn-primary">make setup</a>
        </div>
      </div>
    </section>

     
  <footer>
    <div class="container">
      <div class="footer-content">
        <p>© 2025 Rife Marketing Agency. All rights reserved.</p>
        <div class="footer-links">
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    window.addEventListener('scroll', () => {
      document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
    });

    // Load editable content from backend
    async function loadSiteContent() {
      try {
        const res = await fetch('/api/content');
        if (!res.ok) return;
        const data = await res.json();
        if (!data.success || !data.content) return;

        const c = data.content;

        const heroSubtitleEl = document.getElementById('hero-subtitle');
        if (heroSubtitleEl && c.heroSubtitle) {
          heroSubtitleEl.textContent = c.heroSubtitle;
        }

        const aboutP1El = document.getElementById('about-p1');
        if (aboutP1El && c.aboutP1) {
          aboutP1El.textContent = c.aboutP1;
        }

        const aboutP2El = document.getElementById('about-p2');
        if (aboutP2El && c.aboutP2) {
          aboutP2El.textContent = c.aboutP2;
        }

        const gallerySubtitleEl = document.getElementById('gallery-subtitle');
        if (gallerySubtitleEl && c.gallerySubtitle) {
          gallerySubtitleEl.textContent = c.gallerySubtitle;
        }

        const contactTextEl = document.getElementById('contact-text');
        if (contactTextEl && c.contactText) {
          contactTextEl.textContent = c.contactText;
        }
      } catch (err) {
        console.error('Failed to load site content', err);
      }
    }

    const contactForm = document.getElementById('contact-form');
    const statusEl = document.getElementById('contact-status');

    if (contactForm) {
      contactForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        statusEl.style.color = 'var(--text-muted)';
        statusEl.textContent = 'Sending…';

        const formData = new FormData(contactForm);
        const payload = {
          name: formData.get('name'),
          email: formData.get('email'),
          message: formData.get('message')
        };

        try {
          const res = await fetch('/api/contact', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok || !data.success) {
            throw new Error(data.error || 'Something went wrong.');
          }

          statusEl.style.color = 'var(--accent)';
          statusEl.textContent = 'Message sent. We\'ll get back to you soon.';
          contactForm.reset();
        } catch (err) {
          console.error(err);
          statusEl.style.color = '#f97373';
          statusEl.textContent = 'Could not send message. Please try again or email us directly.';
        }
      });
    }

    // Initial content load
    loadSiteContent();
  </script>
</body>
</html>
